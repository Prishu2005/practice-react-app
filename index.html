<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rose Day 🌹 My Baccha❤️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Question Page -->
    <div id="questionPage" class="page active">
        <div class="hearts-background"></div>
        <div class="roses-float"></div>
        <div class="content">
            <h1 class="question">Will you be my rose in this valentine❤️?</h1>
            <div class="name-tag">My Baccha❤️</div>
            <div class="buttons-container">
                <button id="yesBtn" class="yes-btn">Yes 💕</button>
                <button id="noBtn" class="no-btn">No</button>
            </div>
        </div>
    </div>

    <!-- Wish Page -->
    <div id="wishPage" class="page">
        <div class="hearts-background"></div>
        <div class="roses-float"></div>
        <div class="wish-content">
            <h1 class="wish-title">Happy Rose Day❤️</h1>
            <div class="rose-bouquet">🌹🌹🌹</div>
            <div class="photo-frame">
                <img src="couple-photo.jpg.jpeg" alt="My Baccha" class="couple-photo">
            </div>
            <div class="love-quote">
                <p>You are my cutie baccha❤️ i am love more baby❤️ sry for everything apko pareshan krne ke liye and all... aur han hum apko chd ke kabhi ni jynge ❤️</p>
                <p class="final-wish">Happy Rose Day Baby🌹</p>
                <p class="love-you">I Love you mera baccha❤️</p>
            </div>
            <div class="rose-bouquet">🌹❤️🌹</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
